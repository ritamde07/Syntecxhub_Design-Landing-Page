<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyntecxHub Advanced</title>

<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">SyntecxHub</div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#features">Features</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>

<!-- HERO -->
<section class="hero">
    <h1>Build Real Skills 🚀</h1>
    <p>Join the most practical internship program</p>
    <button class="btn">Get Started</button>
</section>

<!-- FEATURES -->
<section id="features" class="features">

    <h2>Why Choose Us</h2>

    <div class="cards">

        <div class="card">
            <h3>Real Projects</h3>
            <p>Work on industry-level projects</p>
        </div>

        <div class="card">
            <h3>Mentorship</h3>
            <p>Guidance from experts</p>
        </div>

        <div class="card">
            <h3>Certificate</h3>
            <p>Boost your resume</p>
        </div>

    </div>
</section>

<!-- CONTACT FORM -->
<section id="contact" class="contact">
    <h2>Apply Now</h2>

    <form id="form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email" required>
        <button type="submit" class="btn">Submit</button>
    </form>
</section>

<!-- FOOTER -->
<footer class="footer">
